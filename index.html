<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEXLAND</title>

<style>
/* 1. 기본 셋팅 및 밀림 방지 */
* {
  box-sizing: border-box;
}

body {
  font-family: 'Malgun Gothic', sans-serif;
  text-align: center;
  background: #f4f6fb;
  margin: 0;
}

/* 메인 영역 (유튜브 영상 위에 위치) */
.main-section {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 50px 0 30px;
}

.box {
  background: white;
  padding: 40px 50px;
  width: 480px; /* 항목이 늘어났으므로 가로 폭을 약간 넓혔습니다 */
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.logo {
  width: 280px;
  max-width: 100%;
  height: auto;
  display: block;
  margin: 0 auto 25px;
}

p {
  font-size: 14px;
  color: #444;
  margin: 8px 0;
  line-height: 1.6;
}

/* 문의 폼 스타일 (이름, 메일, 연락처, 내용) */
.inquiry-form {
  margin-top: 25px;
  text-align: left;
}

.inquiry-form label {
  font-size: 12px;
  font-weight: bold;
  color: #666;
  display: block;
  margin-bottom: 5px;
  margin-left: 2px;
}

.inquiry-form input,
.inquiry-form textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
}

.inquiry-form input:focus,
.inquiry-form textarea:focus {
  border-color: #2b6cff;
}

.inquiry-form textarea {
  resize: none;
}

/* 버튼 스타일 */
button {
  width: 100%;
  padding: 14px;
  background: #2b6cff;
  border: none;
  color: white;
  border-radius: 6px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: background 0.3s;
}

button:hover {
  background: #1f52c9;
}

.home-btn {
  background: #666;
  margin-top: 10px;
  font-size: 14px;
  padding: 10px;
}

/* 유튜브 영상 영역 (메인 폼 아래 위치) */
.video-section {
  width: 100%;
  text-align: center;
  margin-bottom: 80px;
}

.video-section iframe {
  width: 720px;
  height: 405px;
  max-width: 90%;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  border: none;
}

/* 하단 연락처 영역 */
.contact-area {
  position: relative;
  width: 100%;
  background: white;
  padding: 30px 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-top: 1px solid #eee;
}

.contact-logo {
  position: absolute;
  left: 50px;
}

.contact-logo img {
  width: 180px;
}

.contact-info {
  text-align: center;
}

.contact-title {
  font-weight: bold;
  margin-bottom: 8px;
  font-size: 18px;
}

.contact-info p {
  margin: 3px 0;
  font-size: 13px;
}

/* 모바일 대응 */
@media (max-width: 768px) {
  .box {
    width: 90%;
    padding: 30px 20px;
  }
  .contact-logo {
    display: none;
  }
  .video-section iframe {
    width: 100%;
    aspect-ratio: 16/9;
    height: auto;
  }
}
</style>
</head>

<body>

<div class="main-section">
  <div class="box">
    <img src="texland.jpg" class="logo" alt="TEXLAND">

    <p>Thank you for visiting <b>TEXLAND</b>.</p>
    <p>Our website is currently under construction.<br>We will be back shortly.</p>

    <form action="https://formspree.io/f/xkoylvda" method="POST" class="inquiry-form">
      <label>Name</label>
      <input type="text" name="name" placeholder="Enter your name" required>

      <label>Email</label>
      <input type="email" name="email" placeholder="Enter your email" required>

      <label>Phone Number</label>
      <input type="tel" name="phone" placeholder="Enter your phone number" required>

      <label>Inquiry</label>
      <textarea name="message" placeholder="Enter your message" rows="4" required></textarea>

      <button type="submit">Send Message</button>
    </form>
    
    <a href="https://texland-nexko.com" style="text-decoration: none;">
      <button class="home-btn">Visit Our Homepage</button>
    </a>
  </div>
</div>

<div class="video-section">
  <iframe
    src="https://www.youtube.com/embed/lBd0orSd7Xk"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
</div>

<footer class="contact-area">
  <div class="contact-logo">
    <img src="texland.jpg" alt="TEXLAND">
  </div>

  <div class="contact-info">
    <div class="contact-title">Contact Details</div>
    <p><b>Address</b> : 22, Seongseogongdan-ro 22-gil Dalseo-gu, Daegu 42718 Republic of Korea</p>
    <p><b>Tel</b> : +82-53-582-1080</p>
    <p><b>Email</b> : info@texland.co.kr</p>
  </div>
</footer>

</body>
</html>
